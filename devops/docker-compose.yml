services:
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: devops-mission-jenkins
    restart: unless-stopped
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home

  ngrok:
    image: ngrok/ngrok:latest
    container_name: devops-mission-ngrok
    restart: unless-stopped
    depends_on:
      - jenkins
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command:
      - http
      - jenkins:8080

volumes:
  jenkins_home:

